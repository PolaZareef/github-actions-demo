name: Build Demo

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Show dist
        run: ls -R dist

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: dist